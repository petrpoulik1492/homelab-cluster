apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: helm
spec:
  interval: 5m
  chart:
    spec:
      chart: nginx
      version: "15.3.1"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: helm
  values:
    replicaCount: 1

    image:
      registry: ghcr.io
      repository: bitnami/nginx
      tag: 1.25.2-debian-11-r37
      pullPolicy: IfNotPresent

    service:
      type: NodePort
