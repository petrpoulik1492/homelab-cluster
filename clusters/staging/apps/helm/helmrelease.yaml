apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx
  namespace: helm 
spec:
  interval: 5m
  chart:
    spec:
      chart: nginx
      version: "15.3.1"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: helm 
  values:
    service:
      type: NodePort 
    replicaCount: 1
