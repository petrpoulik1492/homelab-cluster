apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: helm-traefik
  namespace: helm 
spec:
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: 9.18.2
  interval: 1m0s

  values:
    controller:
      replicaCount: 1

      service:
        type: NodePort   # k3s-friendly
