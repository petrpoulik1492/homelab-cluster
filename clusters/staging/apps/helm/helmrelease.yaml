apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: helm 
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: helm

  values:
    controller:
      replicaCount: 1

      service:
        type: NodePort   # k3s-friendly
