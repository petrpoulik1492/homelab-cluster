apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: blog-nginx
  namespace: blog
spec:
  interval: 1m
  chart:
    spec:
      chart: ./apps/nginx
      sourceRef:
        kind: GitRepository
        name: apps
        namespace: flux-system
  values:
    persistence:
      enabled: true
      size: 1Gi
