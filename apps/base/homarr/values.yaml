replicaCount: 1

image:
  repository: ghcr.io/ajnart/homarr
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP 
  port: 7575
  annotations:
    cloudflared-access: "true"

ingress:
  - hostname: homarr.petrpoulik1492.com
    service: http://localhost:7575
  - service: http_status:404

annotations:
  cloudflared-access: "true"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  homarrDatabase:
    enabled: true
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClassName: "default"

env:
  TZ: Europe/Prague

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

podSecurityContext:
  fsGroup: 1000

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5

autoscaling:
  enabled: false
