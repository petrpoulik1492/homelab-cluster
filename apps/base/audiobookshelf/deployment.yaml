apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf 
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 33 # www-data group ID
        runAsUser: 33 # www-data user ID
        runAsGroup: 33 # www-data group ID

      containers:
        - name: audiobookshelf 
          image: ghcr.io/advplyr/audiobookshelf:2.33.1
          ports:
            - containerPort: 3005 
          
          envFrom:
            - configMapRef:
                name: audiobookshelf-config
            - secretRef:
                name: audiobookshelf-container-env        
          
          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: audiobookshelf
            mountPath: /etc/audiobookshelf/data
            subPath: data
            - name: audiobookshelf
            mountPath: /etc/audiobookshelf/config
            subPath: config
            - name: audiobookshelf
            mountPath: /etc/audiobookshelf/metadata
            subPath: metadata
            - name: audiobookshelf
            mountPath: /etc/audiobookshelf/audiobooks
            subPath: audiobooks
            - name: audiobookshelf
            mountPath: /etc/audiobookshelf/podcasts
     
      volumes:
       - name: data
         persistentVolumeClaim:
           claimName: audiobookshelf-data-pvc
