apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 1000 
        runAsUser: 1000 
        runAsGroup: 1000 

      containers:
        - name: audiobookshelf
          image: ghcr.io/advplyr/audiobookshelf:2.33.1
          ports:
            - containerPort: 3005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: audiobookshelf-configmap 

          volumeMounts:
            - name: data 
              mountPath: /etc/audiobookshelf/data
              subPath: data 
            - name: data 
              mountPath: /etc/audiobookshelf/config
              subPath: config 
            - name: data 
              mountPath: /etc/audiobookshelf/metadata
              subPath: metadata 
            - name: data 
              mountPath: /etc/audiobookshelf/audiobooks
              subPath: audiobooks 
            - name: data 
              mountPath: /etc/audiobookshelf/podcasts
              subPath: podcasts 
     
      restartPolicy: Always

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: audiobookshelf-data-pvc
