apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blog-nginx
  namespace: blog
spec:
  interval: 1m
  chart:
    spec:
      chart: ./apps/base/blog
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1m
  values:
    persistence:
      enabled: false 
      size: 1Gi
      storageClass: longhorn
      accessModes:
        - ReadWriteOnce
    staticSiteConfigmap: blog-nginx
